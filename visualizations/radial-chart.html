<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Radial Bar · Raptor Migration by Month</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#F9F8FA;font-family:'DM Sans',sans-serif;font-weight:300;padding:40px;}
h1{font-family:'IM Fell English',serif;font-size:26px;color:#3a3020;margin-bottom:6px;}
.subtitle{font-size:13px;color:#93876F;margin-bottom:28px;max-width:560px;line-height:1.6;}
.layout{display:flex;gap:32px;align-items:center;flex-wrap:wrap;}
.chart-wrap{background:#f2ede0;border:1px solid #d8ceb8;border-radius:4px;padding:20px;display:flex;justify-content:center;}
</style>
</head>
<body>
<h1>Raptor Migration · Radial Bar</h1>
<p class="subtitle">Monthly raptor sighting distribution in San Francisco from raptor_monthly.json.</p>

<div class="layout">
  <div class="chart-wrap">
    <svg id="radial-svg" viewBox="0 0 420 420" width="420" style="display:block;"></svg>
  </div>
</div>

<script>
d3.json('../data/processed/raptor_monthly.json').then(raw => {

  const months = raw.map(d => d.month_name);
  const vals   = raw.map(d => d.total_sightings);
  const total  = d3.sum(vals);
  const pcts   = vals.map(v => +(v / total * 100).toFixed(1));

  const sepIdx = raw.findIndex(d => d.month_name === 'Sep');
  const octIdx = raw.findIndex(d => d.month_name === 'Oct');
  const sepOctPct = ((raw[sepIdx].total_sightings + raw[octIdx].total_sightings) / total * 100).toFixed(1);
  const minVal = d3.min(vals);
  const minMonth = raw[vals.indexOf(minVal)].month_name;

  // sidebar stats
  const sb = d3.select('#sidebar');
  sb.append('div').style('margin-bottom','12px')
    .html(`<div style="font-family:'IM Fell English',serif;font-size:34px;color:#8a6010;line-height:1">${sepOctPct}%</div>
           <div style="font-size:11px;color:#93876F;margin-top:3px">of all SF raptor sightings in Sep + Oct</div>`);
  sb.append('div').style('margin-bottom','12px')
    .html(`<div style="font-family:'IM Fell English',serif;font-size:34px;color:#8a6010;line-height:1">${(d3.max(vals)/minVal).toFixed(1)}×</div>
           <div style="font-size:11px;color:#93876F;margin-top:3px">peak month vs summer low (${minMonth})</div>`);
  sb.append('p').attr('class','note')
    .text('The same Sep/Oct spike appears across all four major raptor species simultaneously — Red-tailed Hawk, Peregrine Falcon, Cooper\'s Hawk, and Merlin. This is the Pacific Flyway, not individual behavior.');

  // chart
  const W=420, H=420, cx=210, cy=210;
  const innerR=60, outerMaxR=160;
  const maxVal = d3.max(vals);

  const svg = d3.select('#radial-svg');
  const angleScale = d3.scaleBand()
    .domain(d3.range(12)).range([0, 2*Math.PI]).padding(0.08);
  const rScale = d3.scaleLinear().domain([0, maxVal]).range([innerR, outerMaxR]);

  const arc = d3.arc()
    .innerRadius(innerR)
    .outerRadius((d,i) => rScale(vals[i]))
    .startAngle((d,i) => angleScale(i))
    .endAngle((d,i) => angleScale(i) + angleScale.bandwidth())
    .padAngle(0.02).cornerRadius(2);

  const g = svg.append('g').attr('transform',`translate(${cx},${cy})`);

  [25,50,75,100].forEach(pct => {
    g.append('circle').attr('r', innerR+(outerMaxR-innerR)*pct/100)
      .attr('fill','none').attr('stroke','#e0d8c8').attr('stroke-width',0.5);
  });
  g.append('circle').attr('r',innerR).attr('fill','#F9F8FA').attr('stroke','#d8ceb8').attr('stroke-width',0.8);

  g.selectAll('path').data(vals).join('path')
    .attr('d',(d,i) => arc(d,i))
    .attr('fill',(d,i) => i===sepIdx||i===octIdx ? '#b87a10' : '#627461')
    .attr('opacity',(d,i) => i===sepIdx||i===octIdx ? 0.9 : 0.5);

  vals.forEach((v,i) => {
    const mid = angleScale(i) + angleScale.bandwidth()/2 - Math.PI/2;
    const lr = outerMaxR + 36;
    const isHL = i===sepIdx||i===octIdx;
    g.append('text')
      .attr('x', Math.cos(mid)*lr).attr('y', Math.sin(mid)*lr)
      .attr('text-anchor','middle').attr('dominant-baseline','central')
      .attr('font-size', isHL?11:9).attr('font-weight', isHL?'500':'300')
      .attr('fill', isHL?'#b87a10':'#93876F').attr('font-family','DM Sans,sans-serif')
      .text(months[i]);

    if (isHL) {
      const vr = rScale(v) + 6;
      g.append('text')
        .attr('x', Math.cos(mid)*vr).attr('y', Math.sin(mid)*vr)
        .attr('text-anchor','middle').attr('dominant-baseline','central')
        .attr('font-size',8).attr('fill','#b87a10').attr('font-family','DM Sans,sans-serif')
        .text(pcts[i]+'%');
    }
  });

  g.append('text').attr('text-anchor','middle').attr('y',-8)
    .attr('font-family','IM Fell English,serif').attr('font-size',13).attr('fill','#3a3020').text('Raptor');
  g.append('text').attr('text-anchor','middle').attr('y',8)
    .attr('font-family','IM Fell English,serif').attr('font-size',13).attr('fill','#3a3020').text('Sightings');
  g.append('text').attr('text-anchor','middle').attr('y',22)
    .attr('font-family','DM Sans,sans-serif').attr('font-size',9).attr('fill','#93876F').text('% by month');

}).catch(() => {
  document.body.insertAdjacentHTML('afterbegin',
    '<p style="color:#803020;padding:20px;font-size:13px">Run with python3 -m http.server — loads from ../data/processed/raptor_monthly.json</p>'
  );
});
</script>
</body>
</html>
